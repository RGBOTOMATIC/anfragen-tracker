<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1a1a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Anfragen" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>Anfragen-Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #f4f4f0; -webkit-tap-highlight-color: transparent; }
    #root { padding-bottom: env(safe-area-inset-bottom); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinning { animation: spin 1s linear infinite; display: inline-block; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const QUELLEN = ["MyHammer", "Maler-Profi", "Empfehlung", "Homepage", "Telefon", "E-Mail", "WhatsApp", "Sonstiges"];
    const STATI = [
      { label: "Offen",         color: "#f59e0b" },
      { label: "Angebot raus",  color: "#3b82f6" },
      { label: "Auftrag",       color: "#10b981" },
      { label: "Abgeschlossen", color: "#6b7280" },
      { label: "Abgesagt",      color: "#ef4444" },
    ];
    const STORAGE_KEY    = "anfragen-v1";
    const GB_STORAGE_KEY = "geburtstage-v1";
    const SYNC_URL_KEY   = "anfragen-script-url";
    const SYNC_COLOR     = { idle: "#888", syncing: "#f59e0b", ok: "#10b981", error: "#ef4444" };
    const MONATE         = ["Jan","Feb","Mär","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];

    // ── localStorage helpers ──────────────────────────────────────────
    function loadData()    { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)    || "[]"); } catch { return []; } }
    function saveData(d)   { try { localStorage.setItem(STORAGE_KEY,    JSON.stringify(d)); } catch {} }
    function loadGbData()  { try { return JSON.parse(localStorage.getItem(GB_STORAGE_KEY) || "[]"); } catch { return []; } }
    function saveGbData(d) { try { localStorage.setItem(GB_STORAGE_KEY, JSON.stringify(d)); } catch {} }

    // ── Birthday helpers ─────────────────────────────────────────────
    // Parst jedes datumsähnliche Format → { d, m } oder null
    function parseDDMM(s) {
      if (!s) return null;
      s = String(s).trim();
      // DD.MM  oder  DD.MM.YYYY  oder  DD.MM.YY
      const dot = s.match(/^(\d{1,2})\.(\d{1,2})(?:\.\d{2,4})?$/);
      if (dot) return { d: parseInt(dot[1]), m: parseInt(dot[2]) };
      // DDMM ohne Punkt (z. B. "1503" → 15.03) – typisch auf mobiler Zahlentastatur
      const ddmm4 = s.match(/^(\d{2})(\d{2})$/);
      if (ddmm4) {
        const d = parseInt(ddmm4[1]), m = parseInt(ddmm4[2]);
        if (d >= 1 && d <= 31 && m >= 1 && m <= 12) return { d, m };
      }
      // YYYY-MM-DD (aus Sheets)
      const iso = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
      if (iso) return { d: parseInt(iso[3]), m: parseInt(iso[2]) };
      // Alles andere, was JavaScript als Datum versteht ("Thu May 28 2026…")
      const dt = new Date(s);
      if (!isNaN(dt.getTime())) return { d: dt.getDate(), m: dt.getMonth() + 1 };
      return null;
    }
    function daysUntil(ddmm) {
      const p = parseDDMM(ddmm);
      if (!p || !p.d || !p.m) return Infinity;
      const now = new Date(); now.setHours(0, 0, 0, 0);
      let target = new Date(now.getFullYear(), p.m - 1, p.d);
      if (target < now) target = new Date(now.getFullYear() + 1, p.m - 1, p.d);
      return Math.round((target - now) / 86400000);
    }
    function formatGbDatum(ddmm) {
      const p = parseDDMM(ddmm);
      if (!p) return ddmm || "";
      return `${p.d}. ${MONATE[p.m - 1] || p.m}`;
    }
    function normalizeDatum(s) {
      const p = parseDDMM(s);
      if (!p || !p.d || !p.m) return String(s).trim();
      return p.d.toString().padStart(2, "0") + "." + p.m.toString().padStart(2, "0");
    }

    // ── Sheets helpers ────────────────────────────────────────────────
    async function sheetsGet(url, sheet = "anfragen") {
      const res = await fetch(`${url}?sheet=${sheet}&t=${Date.now()}`);
      const data = await res.json();
      if (!Array.isArray(data)) throw new Error("Ungültige Antwort vom Script");
      return data.map(r => ({ ...r, id: Number(r.id) }));
    }
    async function sheetsPost(url, data, sheet = "anfragen") {
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify({ action: "save", sheet, data }),
      });
      if (!res.ok) throw new Error("HTTP " + res.status);
    }

    const emptyForm   = () => ({
      quelle: "MyHammer", kunde: "", notiz: "", adresse: "",
      telefon: "", email: "", status: "Offen",
      datum: new Date().toISOString().slice(0, 10),
    });
    const emptyGbForm = () => ({ name: "", datum: "", notiz: "" });

    // ── BottomNav ─────────────────────────────────────────────────────
    function BottomNav({ section, onAnfragen, onGeburtstage }) {
      return (
        <div style={styles.bottomNav}>
          <button
            style={{ ...styles.navBtn, ...(section === "anfragen" ? styles.navBtnActive : {}) }}
            onClick={onAnfragen}>
            <div style={styles.navIcon}>📋</div>
            <div style={styles.navLabel}>Anfragen</div>
          </button>
          <button
            style={{ ...styles.navBtn, ...(section === "geburtstage" ? styles.navBtnActive : {}) }}
            onClick={onGeburtstage}>
            <div style={styles.navIcon}>🎂</div>
            <div style={styles.navLabel}>Geburtstage</div>
          </button>
        </div>
      );
    }

    // ── App ───────────────────────────────────────────────────────────
    function App() {
      // Anfragen state
      const [anfragen,    setAnfragen]    = useState(loadData);
      const [view,        setView]        = useState("list");
      const [form,        setForm]        = useState(emptyForm);
      const [selected,    setSelected]    = useState(null);
      const [filter,      setFilter]      = useState("Alle");
      const [search,      setSearch]      = useState("");
      const [syncStatus,  setSyncStatus]  = useState("idle");
      const [settingsUrl, setSettingsUrl] = useState("");
      const [testResult,  setTestResult]  = useState(null);

      // Geburtstage state
      const [geburtstage, setGeburtstage] = useState(loadGbData);
      const [gView,       setGView]       = useState("list");
      const [gForm,       setGForm]       = useState(emptyGbForm);
      const [gSelected,   setGSelected]   = useState(null);
      const [gSyncStatus, setGSyncStatus] = useState("idle");

      // Navigation
      const [section, setSection] = useState("anfragen");

      const syncUrlRef   = useRef(localStorage.getItem(SYNC_URL_KEY) || "");
      const skipSyncRef  = useRef(false);
      const skipGSyncRef = useRef(false);
      const hasSyncUrl   = !!syncUrlRef.current;

      // ── Anfragen: initial load from Sheets ────────────────────────
      useEffect(() => {
        const url = syncUrlRef.current;
        if (!url) return;
        setSyncStatus("syncing");
        sheetsGet(url, "anfragen")
          .then(data => {
            if (data.length > 0) {
              skipSyncRef.current = true;
              setAnfragen(data); saveData(data);
            } else {
              const local = loadData();
              if (local.length > 0) sheetsPost(url, local, "anfragen").catch(() => {});
            }
            setSyncStatus("ok");
          }).catch(() => setSyncStatus("error"));
      }, []);

      // ── Anfragen: save on change ──────────────────────────────────
      useEffect(() => {
        saveData(anfragen);
        if (skipSyncRef.current) { skipSyncRef.current = false; return; }
        const url = syncUrlRef.current;
        if (!url) return;
        setSyncStatus("syncing");
        const t = setTimeout(() => {
          sheetsPost(url, anfragen, "anfragen")
            .then(() => setSyncStatus("ok")).catch(() => setSyncStatus("error"));
        }, 600);
        return () => clearTimeout(t);
      }, [anfragen]);

      // ── Geburtstage: Datum beim Start aus localStorage normalisieren ─
      useEffect(() => {
        setGeburtstage(prev => {
          const fixed = prev.map(g => ({ ...g, datum: normalizeDatum(g.datum || "") }));
          return fixed.every((g, i) => g.datum === prev[i].datum) ? prev : fixed;
        });
      }, []);

      // ── Geburtstage: initial load from Sheets ─────────────────────
      useEffect(() => {
        const url = syncUrlRef.current;
        if (!url) return;
        setGSyncStatus("syncing");
        sheetsGet(url, "geburtstage")
          .then(data => {
            if (data.length > 0) {
              // Datum normalisieren (Sheets konvertiert "28.05" oft zu Datumsobjekten)
              const cleaned = data.map(g => ({ ...g, datum: normalizeDatum(g.datum || "") }));
              skipGSyncRef.current = true;
              setGeburtstage(cleaned); saveGbData(cleaned);
            } else {
              const local = loadGbData();
              if (local.length > 0) sheetsPost(url, local, "geburtstage").catch(() => {});
            }
            setGSyncStatus("ok");
          }).catch(() => setGSyncStatus("error"));
      }, []);

      // ── Geburtstage: save on change ───────────────────────────────
      useEffect(() => {
        saveGbData(geburtstage);
        if (skipGSyncRef.current) { skipGSyncRef.current = false; return; }
        const url = syncUrlRef.current;
        if (!url) return;
        setGSyncStatus("syncing");
        const t = setTimeout(() => {
          sheetsPost(url, geburtstage, "geburtstage")
            .then(() => setGSyncStatus("ok")).catch(() => setGSyncStatus("error"));
        }, 600);
        return () => clearTimeout(t);
      }, [geburtstage]);

      // ── Refresh helpers ───────────────────────────────────────────
      const refreshAnfragen = () => {
        const url = syncUrlRef.current;
        if (!url) return;
        setSyncStatus("syncing");
        sheetsGet(url, "anfragen")
          .then(data => {
            if (data.length > 0) { skipSyncRef.current = true; setAnfragen(data); saveData(data); }
            setSyncStatus("ok");
          }).catch(() => setSyncStatus("error"));
      };
      const refreshGeburtstage = () => {
        const url = syncUrlRef.current;
        if (!url) return;
        setGSyncStatus("syncing");
        sheetsGet(url, "geburtstage")
          .then(data => {
            if (data.length > 0) {
              const cleaned = data.map(g => ({ ...g, datum: normalizeDatum(g.datum || "") }));
              skipGSyncRef.current = true;
              setGeburtstage(cleaned); saveGbData(cleaned);
            }
            setGSyncStatus("ok");
          }).catch(() => setGSyncStatus("error"));
      };

      // ── Anfragen handlers ─────────────────────────────────────────
      const addAnfrage = () => {
        if (!form.kunde.trim()) return;
        setAnfragen(prev => [{ ...form, id: Date.now() }, ...prev]);
        setForm(emptyForm()); setView("list");
      };
      const updateStatus = (id, status) =>
        setAnfragen(prev => prev.map(a => a.id === id ? { ...a, status } : a));
      const deleteAnfrage = (id) => {
        if (!window.confirm("Anfrage wirklich löschen?")) return;
        setAnfragen(prev => prev.filter(a => a.id !== id));
        setView("list"); setSelected(null);
      };

      // ── Geburtstage handlers ──────────────────────────────────────
      const addGeburtstag = () => {
        if (!gForm.name.trim() || !gForm.datum.trim()) return;
        const datum = normalizeDatum(gForm.datum);
        setGeburtstage(prev => [{ ...gForm, datum, id: Date.now() }, ...prev]);
        setGForm(emptyGbForm()); setGView("list");
      };
      const deleteGeburtstag = (id) => {
        if (!window.confirm("Geburtstag wirklich löschen?")) return;
        setGeburtstage(prev => prev.filter(g => g.id !== id));
        setGView("list"); setGSelected(null);
      };

      // ── Settings handlers ─────────────────────────────────────────
      const testConnection = async () => {
        if (!settingsUrl.trim()) return;
        setTestResult({ loading: true });
        try {
          const data = await sheetsGet(settingsUrl.trim(), "anfragen");
          setTestResult({ ok: true, count: data.length });
        } catch (e) {
          setTestResult({ ok: false, msg: e.message });
        }
      };
      const saveSettings = async () => {
        const url = settingsUrl.trim();
        syncUrlRef.current = url;
        localStorage.setItem(SYNC_URL_KEY, url);
        setView("list");
        if (!url) return;
        setSyncStatus("syncing");
        try {
          const data = await sheetsGet(url, "anfragen");
          if (data.length > 0) { skipSyncRef.current = true; setAnfragen(data); saveData(data); }
          else { await sheetsPost(url, anfragen, "anfragen"); }
          setSyncStatus("ok");
        } catch { setSyncStatus("error"); }
      };

      // ── Nav helpers ───────────────────────────────────────────────
      const navAnfragen    = () => { setSection("anfragen");    setView("list");  };
      const navGeburtstage = () => { setSection("geburtstage"); setGView("list"); };
      const nav = <BottomNav section={section} onAnfragen={navAnfragen} onGeburtstage={navGeburtstage} />;

      // ── Computed ──────────────────────────────────────────────────
      const filtered = anfragen.filter(a => {
        const matchFilter = filter === "Alle" || a.status === filter;
        const matchSearch = !search ||
          a.kunde.toLowerCase().includes(search.toLowerCase()) ||
          (a.notiz  || "").toLowerCase().includes(search.toLowerCase()) ||
          (a.quelle || "").toLowerCase().includes(search.toLowerCase());
        return matchFilter && matchSearch;
      });
      const statusColor = s => STATI.find(x => x.label === s)?.color || "#999";
      const counts = {};
      STATI.forEach(s => { counts[s.label] = anfragen.filter(a => a.status === s.label).length; });

      // ── SETTINGS ──────────────────────────────────────────────────
      if (view === "settings") return (
        <div style={styles.page}>
          <div style={styles.header}>
            <button style={styles.back} onClick={() => setView("list")}>← Zurück</button>
            <span style={styles.title}>Einstellungen</span>
            <div style={{ width: 70 }} />
          </div>
          <div style={styles.form}>
            <label style={styles.label}>Google Apps Script URL</label>
            <textarea
              style={{ ...styles.input, height: 80, fontSize: 13, resize: "vertical" }}
              placeholder="https://script.google.com/macros/s/…/exec"
              value={settingsUrl}
              onChange={e => { setSettingsUrl(e.target.value); setTestResult(null); }}
            />
            {testResult && !testResult.loading && (
              <div style={{
                padding: "10px 14px", borderRadius: 8, marginBottom: 8, fontSize: 13,
                background: testResult.ok ? "#d1fae5" : "#fee2e2",
                color:      testResult.ok ? "#065f46" : "#991b1b",
              }}>
                {testResult.ok
                  ? `✓ Verbunden – ${testResult.count} Einträge im Sheet`
                  : `✗ Fehler: ${testResult.msg}`}
              </div>
            )}
            <button
              style={{ ...styles.chip, width: "100%", textAlign: "center", padding: "10px", marginBottom: 8 }}
              onClick={testConnection}>
              {testResult?.loading ? "…" : "Verbindung testen"}
            </button>
            <button style={styles.primary} onClick={saveSettings}>Speichern & verbinden</button>
            <div style={{ marginTop: 24, background: "#fff", borderRadius: 12, padding: 16 }}>
              <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 10 }}>Setup-Anleitung</div>
              <div style={{ fontSize: 13, color: "#555", lineHeight: 1.9 }}>
                <div>1. Neues Google Sheet anlegen</div>
                <div>2. <strong>Erweiterungen → Apps Script</strong></div>
                <div>3. Inhalt von <code style={{ background: "#f0f0f0", padding: "1px 5px", borderRadius: 4 }}>apps-script/Code.gs</code> einfügen</div>
                <div>4. <strong>Deployen → Als Web-App</strong></div>
                <div>&nbsp;&nbsp;&nbsp;Ausführen als: <em>Ich</em> · Zugriff: <em>Jeder</em></div>
                <div>5. Die Deployment-URL hier einfügen</div>
              </div>
            </div>
            {hasSyncUrl && (
              <button
                style={{ ...styles.chip, width: "100%", textAlign: "center", padding: "10px", marginTop: 16, color: "#ef4444", borderColor: "#ef4444" }}
                onClick={() => {
                  syncUrlRef.current = "";
                  localStorage.removeItem(SYNC_URL_KEY);
                  setSettingsUrl(""); setTestResult(null); setSyncStatus("idle");
                }}>
                Sync deaktivieren
              </button>
            )}
          </div>
          {nav}
        </div>
      );

      // ── ANFRAGEN: NEW ──────────────────────────────────────────────
      if (section === "anfragen" && view === "new") return (
        <div style={styles.page}>
          <div style={styles.header}>
            <button style={styles.back} onClick={() => setView("list")}>← Zurück</button>
            <span style={styles.title}>Neue Anfrage</span>
            <div style={{ width: 70 }} />
          </div>
          <div style={styles.form}>
            <label style={styles.label}>Quelle</label>
            <div style={styles.chipRow}>
              {QUELLEN.map(q => (
                <button key={q}
                  style={{ ...styles.chip, ...(form.quelle === q ? styles.chipActive : {}) }}
                  onClick={() => setForm(f => ({ ...f, quelle: q }))}>{q}</button>
              ))}
            </div>
            <label style={styles.label}>Kunde / Name *</label>
            <input style={styles.input} placeholder="z. B. Meyer" value={form.kunde}
              onChange={e => setForm(f => ({ ...f, kunde: e.target.value }))} autoFocus />
            <label style={styles.label}>Adresse</label>
            <input style={styles.input} placeholder="Musterstr. 1, 12345 Stadt" value={form.adresse}
              onChange={e => setForm(f => ({ ...f, adresse: e.target.value }))} />
            <label style={styles.label}>Telefon</label>
            <input style={styles.input} type="tel" placeholder="z. B. 0151 12345678" value={form.telefon}
              onChange={e => setForm(f => ({ ...f, telefon: e.target.value }))} />
            <label style={styles.label}>E-Mail</label>
            <input style={styles.input} type="email" placeholder="z. B. kunde@beispiel.de" value={form.email}
              onChange={e => setForm(f => ({ ...f, email: e.target.value }))} />
            <label style={styles.label}>Notiz / Leistung</label>
            <textarea style={{ ...styles.input, height: 80, resize: "vertical" }}
              placeholder="z. B. Bilder erfragt, Innenputz 80m²..."
              value={form.notiz} onChange={e => setForm(f => ({ ...f, notiz: e.target.value }))} />
            <label style={styles.label}>Status</label>
            <div style={styles.chipRow}>
              {STATI.map(s => (
                <button key={s.label}
                  style={{ ...styles.chip, ...(form.status === s.label ? { background: s.color, color: "#fff", borderColor: s.color } : {}) }}
                  onClick={() => setForm(f => ({ ...f, status: s.label }))}>{s.label}</button>
              ))}
            </div>
            <label style={styles.label}>Datum</label>
            <input type="date" style={styles.input} value={form.datum}
              onChange={e => setForm(f => ({ ...f, datum: e.target.value }))} />
            <button style={styles.primary} onClick={addAnfrage}>＋ Speichern</button>
          </div>
          {nav}
        </div>
      );

      // ── ANFRAGEN: DETAIL ───────────────────────────────────────────
      if (section === "anfragen" && view === "detail" && selected) {
        const a = anfragen.find(x => x.id === selected);
        if (!a) { setView("list"); return null; }
        return (
          <div style={styles.page}>
            <div style={styles.header}>
              <button style={styles.back} onClick={() => setView("list")}>← Zurück</button>
              <span style={styles.title}>Anfrage</span>
              <button style={{ ...styles.back, color: "#ef4444" }} onClick={() => deleteAnfrage(a.id)}>Löschen</button>
            </div>
            <div style={{ padding: "16px 16px 100px" }}>
              <div style={{ ...styles.badge, background: statusColor(a.status) }}>{a.status}</div>
              <div style={styles.detailQuelle}>{a.quelle}</div>
              <div style={styles.detailKunde}>{a.kunde}</div>
              {a.adresse && <div style={styles.detailMeta}>📍 {a.adresse}</div>}
              {a.telefon && <div style={styles.detailMeta}>📞 {a.telefon}</div>}
              {a.email   && <div style={styles.detailMeta}>✉️ {a.email}</div>}
              {a.notiz   && <div style={styles.detailNotiz}>{a.notiz}</div>}
              <div style={styles.detailMeta}>📅 {a.datum}</div>
              <div style={{ marginTop: 28 }}>
                <div style={styles.label}>Status ändern</div>
                <div style={styles.chipRow}>
                  {STATI.map(s => (
                    <button key={s.label}
                      style={{ ...styles.chip, ...(a.status === s.label ? { background: s.color, color: "#fff", borderColor: s.color } : {}) }}
                      onClick={() => updateStatus(a.id, s.label)}>{s.label}</button>
                  ))}
                </div>
              </div>
            </div>
            {nav}
          </div>
        );
      }

      // ── GEBURTSTAGE: NEW ───────────────────────────────────────────
      if (section === "geburtstage" && gView === "new") return (
        <div style={styles.page}>
          <div style={styles.header}>
            <button style={styles.back} onClick={() => setGView("list")}>← Zurück</button>
            <span style={styles.title}>Neuer Geburtstag</span>
            <div style={{ width: 70 }} />
          </div>
          <div style={styles.form}>
            <label style={styles.label}>Name *</label>
            <input style={styles.input} placeholder="z. B. Maria" value={gForm.name}
              onChange={e => setGForm(f => ({ ...f, name: e.target.value }))} autoFocus />
            <label style={styles.label}>Geburtstag (TT.MM) *</label>
            <input style={styles.input} placeholder="z. B. 2412" value={gForm.datum}
              inputMode="numeric"
              onChange={e => setGForm(f => ({ ...f, datum: e.target.value }))} />
            <div style={{ fontSize: 12, color: "#aaa", marginTop: 4, marginBottom: 8 }}>
              Tag + Monat eingeben, z. B. 2412 oder 24.12 für Heiligabend
            </div>
            <label style={styles.label}>Notiz (optional)</label>
            <input style={styles.input} placeholder="z. B. Lieblingsblumen: Rosen"
              value={gForm.notiz}
              onChange={e => setGForm(f => ({ ...f, notiz: e.target.value }))} />
            <button style={styles.primary} onClick={addGeburtstag}>＋ Speichern</button>
          </div>
          {nav}
        </div>
      );

      // ── GEBURTSTAGE: DETAIL ────────────────────────────────────────
      if (section === "geburtstage" && gView === "detail" && gSelected) {
        const g = geburtstage.find(x => x.id === gSelected);
        if (!g) { setGView("list"); return null; }
        const days = daysUntil(g.datum);
        return (
          <div style={styles.page}>
            <div style={styles.header}>
              <button style={styles.back} onClick={() => setGView("list")}>← Zurück</button>
              <span style={styles.title}>Geburtstag</span>
              <button style={{ ...styles.back, color: "#ef4444" }} onClick={() => deleteGeburtstag(g.id)}>Löschen</button>
            </div>
            <div style={{ padding: "16px 16px 100px" }}>
              <div style={styles.detailKunde}>{g.name}</div>
              <div style={{ fontSize: 22, marginTop: 10, color: "#444" }}>
                🎂 {formatGbDatum(g.datum)}
              </div>
              {days === 0 && (
                <div style={{ marginTop: 14, fontSize: 18, color: "#10b981", fontWeight: 700 }}>
                  🎉 Heute Geburtstag!
                </div>
              )}
              {days === 1 && (
                <div style={{ marginTop: 14, fontSize: 16, color: "#f59e0b", fontWeight: 600 }}>
                  Morgen ist Geburtstag!
                </div>
              )}
              {days > 1 && (
                <div style={{ marginTop: 14, fontSize: 15, color: "#888" }}>
                  in {days} Tagen
                </div>
              )}
              {g.notiz && <div style={{ ...styles.detailNotiz, marginTop: 20 }}>{g.notiz}</div>}
            </div>
            {nav}
          </div>
        );
      }

      // ── GEBURTSTAGE: LIST ──────────────────────────────────────────
      if (section === "geburtstage") {
        const sorted = [...geburtstage].sort((a, b) => daysUntil(a.datum) - daysUntil(b.datum));
        return (
          <div style={styles.page}>
            <div style={styles.header}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span style={styles.title}>🎂 Geburtstage</span>
                {hasSyncUrl && (
                  <button onClick={refreshGeburtstage} style={styles.syncBtn}
                    title="Aus Sheets laden">
                    <span style={{ ...styles.syncDot, background: SYNC_COLOR[gSyncStatus] }}
                      className={gSyncStatus === "syncing" ? "spinning" : ""} />
                  </button>
                )}
              </div>
              <button style={styles.addBtn}
                onClick={() => { setGForm(emptyGbForm()); setGView("new"); }}>
                ＋ Neu
              </button>
            </div>
            <div style={{ ...styles.list, paddingBottom: 90 }}>
              {sorted.length === 0 && (
                <div style={styles.empty}>Noch keine Geburtstage eingetragen</div>
              )}
              {sorted.map(g => {
                const days = daysUntil(g.datum);
                const isToday    = days === 0;
                const isTomorrow = days === 1;
                return (
                  <button key={g.id} style={styles.card}
                    onClick={() => { setGSelected(g.id); setGView("detail"); }}>
                    <div style={{ fontSize: 28, lineHeight: 1, paddingTop: 2 }}>
                      {isToday ? "🎉" : "🎂"}
                    </div>
                    <div style={styles.cardBody}>
                      <div style={styles.cardKunde}>{g.name}</div>
                      <div style={{ fontSize: 14, color: "#666" }}>{formatGbDatum(g.datum)}</div>
                      {g.notiz && <div style={styles.cardNotiz}>{g.notiz}</div>}
                    </div>
                    <div style={{
                      fontSize: 12, fontWeight: 700, padding: "4px 8px", borderRadius: 8,
                      background: isToday ? "#d1fae5" : isTomorrow ? "#fef3c7" : "#f0f0f0",
                      color: isToday ? "#065f46" : isTomorrow ? "#92400e" : "#666",
                      whiteSpace: "nowrap", alignSelf: "center", flexShrink: 0,
                    }}>
                      {isToday ? "Heute! 🎉" : isTomorrow ? "Morgen" : `in ${days}d`}
                    </div>
                  </button>
                );
              })}
            </div>
            {nav}
          </div>
        );
      }

      // ── ANFRAGEN: LIST (default) ───────────────────────────────────
      return (
        <div style={styles.page}>
          <div style={styles.header}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <span style={styles.title}>📋 Anfragen</span>
              {hasSyncUrl && (
                <button onClick={refreshAnfragen} style={styles.syncBtn}
                  title={syncStatus === "error" ? "Sync-Fehler – tippen zum Wiederholen" : "Aus Sheets laden"}>
                  <span style={{ ...styles.syncDot, background: SYNC_COLOR[syncStatus] }}
                    className={syncStatus === "syncing" ? "spinning" : ""} />
                </button>
              )}
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <button style={styles.settingsBtn}
                onClick={() => { setSettingsUrl(syncUrlRef.current); setTestResult(null); setView("settings"); }}>
                ⚙
              </button>
              <button style={styles.addBtn} onClick={() => { setForm(emptyForm()); setView("new"); }}>＋ Neu</button>
            </div>
          </div>

          <div style={{ padding: "10px 16px 0" }}>
            <input style={{ ...styles.input, marginBottom: 0 }} placeholder="🔍 Suchen…"
              value={search} onChange={e => setSearch(e.target.value)} />
          </div>

          <div style={styles.tabs}>
            {["Alle", ...STATI.map(s => s.label)].map(f => (
              <button key={f}
                style={{ ...styles.tab, ...(filter === f ? { borderBottom: "2px solid #1a1a1a", color: "#1a1a1a", fontWeight: "600" } : {}) }}
                onClick={() => setFilter(f)}>
                {f}
                <span style={styles.tabCount}>{f === "Alle" ? anfragen.length : (counts[f] || 0)}</span>
              </button>
            ))}
          </div>

          <div style={styles.list}>
            {filtered.length === 0 && <div style={styles.empty}>Keine Anfragen gefunden</div>}
            {filtered.map(a => (
              <button key={a.id} style={styles.card}
                onClick={() => { setSelected(a.id); setView("detail"); }}>
                <div style={styles.cardLeft}>
                  <div style={{ ...styles.statusDot, background: statusColor(a.status) }} />
                </div>
                <div style={styles.cardBody}>
                  <div style={styles.cardTop}>
                    <span style={styles.cardQuelle}>{a.quelle}</span>
                    <span style={styles.cardDatum}>{a.datum}</span>
                  </div>
                  <div style={styles.cardKunde}>{a.kunde}</div>
                  {a.notiz   && <div style={styles.cardNotiz}>{a.notiz}</div>}
                  {a.adresse && <div style={styles.cardAdresse}>📍 {a.adresse}</div>}
                </div>
                <div style={{ ...styles.badge, background: statusColor(a.status), alignSelf: "center", flexShrink: 0 }}>
                  {a.status}
                </div>
              </button>
            ))}
          </div>
          {nav}
        </div>
      );
    }

    const styles = {
      page:        { fontFamily: "'Segoe UI', system-ui, sans-serif", background: "#f4f4f0", minHeight: "100vh", maxWidth: 480, margin: "0 auto", position: "relative" },
      header:      { background: "#1a1a1a", color: "#fff", display: "flex", alignItems: "center", justifyContent: "space-between", padding: "14px 16px", paddingTop: "max(14px, env(safe-area-inset-top))", position: "sticky", top: 0, zIndex: 10 },
      title:       { fontSize: 18, fontWeight: "700", letterSpacing: "-0.3px" },
      back:        { background: "none", border: "none", color: "#ccc", fontSize: 14, cursor: "pointer", padding: "4px 0" },
      addBtn:      { background: "#f59e0b", color: "#1a1a1a", border: "none", borderRadius: 8, padding: "8px 14px", fontWeight: "700", fontSize: 15, cursor: "pointer" },
      settingsBtn: { background: "none", border: "1px solid #444", color: "#ccc", borderRadius: 8, padding: "7px 10px", fontSize: 15, cursor: "pointer" },
      syncBtn:     { background: "none", border: "none", cursor: "pointer", padding: 4, display: "flex", alignItems: "center" },
      syncDot:     { display: "inline-block", width: 10, height: 10, borderRadius: "50%" },
      form:        { padding: "16px 16px 100px" },
      label:       { display: "block", fontSize: 12, fontWeight: "600", color: "#666", marginBottom: 6, marginTop: 16, textTransform: "uppercase", letterSpacing: "0.5px" },
      input:       { width: "100%", boxSizing: "border-box", border: "1.5px solid #ddd", borderRadius: 10, padding: "12px 14px", fontSize: 16, background: "#fff", outline: "none", marginBottom: 4, fontFamily: "inherit" },
      chipRow:     { display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 4 },
      chip:        { border: "1.5px solid #ddd", borderRadius: 20, padding: "7px 14px", fontSize: 13, background: "#fff", cursor: "pointer", fontFamily: "inherit", color: "#444" },
      chipActive:  { background: "#1a1a1a", color: "#fff", borderColor: "#1a1a1a" },
      primary:     { marginTop: 24, width: "100%", background: "#1a1a1a", color: "#fff", border: "none", borderRadius: 12, padding: "16px", fontSize: 17, fontWeight: "700", cursor: "pointer", fontFamily: "inherit" },
      tabs:        { display: "flex", overflowX: "auto", background: "#fff", borderBottom: "1px solid #eee", padding: "0 8px" },
      tab:         { flex: "0 0 auto", background: "none", border: "none", borderBottom: "2px solid transparent", padding: "12px 10px", fontSize: 13, color: "#888", cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", gap: 4, whiteSpace: "nowrap" },
      tabCount:    { background: "#f0f0f0", borderRadius: 10, padding: "1px 6px", fontSize: 11, fontWeight: "700", color: "#666" },
      list:        { padding: "12px 12px 90px" },
      empty:       { textAlign: "center", color: "#aaa", padding: "60px 20px", fontSize: 15 },
      card:        { width: "100%", display: "flex", alignItems: "flex-start", gap: 12, background: "#fff", border: "none", borderRadius: 12, padding: "14px 12px", marginBottom: 10, cursor: "pointer", textAlign: "left", boxShadow: "0 1px 4px rgba(0,0,0,0.07)", fontFamily: "inherit" },
      cardLeft:    { paddingTop: 4 },
      statusDot:   { width: 10, height: 10, borderRadius: "50%", flexShrink: 0 },
      cardBody:    { flex: 1, minWidth: 0 },
      cardTop:     { display: "flex", justifyContent: "space-between", marginBottom: 2 },
      cardQuelle:  { fontSize: 11, color: "#888", fontWeight: "600", textTransform: "uppercase" },
      cardDatum:   { fontSize: 11, color: "#aaa" },
      cardKunde:   { fontSize: 16, fontWeight: "700", color: "#1a1a1a", marginBottom: 3 },
      cardNotiz:   { fontSize: 13, color: "#555", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" },
      cardAdresse: { fontSize: 12, color: "#888", marginTop: 2 },
      badge:       { borderRadius: 6, padding: "3px 8px", fontSize: 11, fontWeight: "700", color: "#fff", whiteSpace: "nowrap" },
      detailQuelle:{ fontSize: 12, color: "#888", fontWeight: "600", textTransform: "uppercase", marginBottom: 4, marginTop: 12 },
      detailKunde: { fontSize: 28, fontWeight: "800", color: "#1a1a1a", marginBottom: 8 },
      detailMeta:  { fontSize: 14, color: "#666", marginTop: 6 },
      detailNotiz: { fontSize: 15, color: "#333", background: "#fff", borderRadius: 10, padding: "12px", marginTop: 10, lineHeight: 1.5 },
      // Bottom nav
      bottomNav:    { position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 480, background: "#1a1a1a", display: "flex", paddingBottom: "env(safe-area-inset-bottom)", zIndex: 20, boxSizing: "border-box", borderTop: "1px solid #333" },
      navBtn:       { flex: 1, background: "none", border: "none", display: "flex", flexDirection: "column", alignItems: "center", padding: "8px 0 10px", cursor: "pointer", color: "#555", fontFamily: "inherit" },
      navBtnActive: { color: "#f59e0b" },
      navIcon:      { fontSize: 20, lineHeight: 1.3 },
      navLabel:     { fontSize: 11, fontWeight: "600", marginTop: 2 },
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("service-worker.js")
          .catch(err => console.warn("Service Worker Fehler:", err));
      });
    }
  </script>
</body>
</html>
